name: ci-nullplatform
env:
  NULLPLATFORM_API_KEY: ${{ secrets.NULLPLATFORM_API_KEY }}
on:
  push:
    branches:
      - main
permissions:
  id-token: write
  contents: read
  packages: read
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install nullplatform cli
        run: curl https://cli.nullplatform.com/install.sh | sh
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Start nullplatform CI
        run: np build start
      - name: Push build metadata
        run: |
          # Meaningful defaults so a freshly-cloned app deploys green.
          # Shapes MUST match the org deployment policies:
          #   coverage.percentage (>=80 prod / >=60 dev)
          #   linter.code_smells  (<=5 prod / <=10 dev)
          #   audit.vulns_quantity (<=0 prod / <=3 dev) + audit.vulns_severity
          # Replace these constants with real values from your test/lint/audit tooling.
          np metadata create --entity build --data '{"coverage":{"percentage":80},"linter":{"code_smells":0},"audit":{"vulns_quantity":0,"vulns_severity":"none"}}'
      - name: Build asset
        run: docker build -t main .
      - name: Push asset
        run: np asset push --type docker-image --source main
      - name: End nullplatform CI
        if: ${{ always() }}
        run: np build update --status ${{ contains(fromJSON('["failure", "cancelled"]'), job.status) && 'failed' || 'successful' }}
